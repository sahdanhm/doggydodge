<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Grid Test</title>

    <style>
      body {
        background: #111;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      #grid {
        display: grid;
        gap: 2px;

        /* default */
        --cols: 10;
        --cell: 40px;

        grid-template-columns: repeat(var(--cols), var(--cell));
      }

      .cell {
        width: var(--cell);
        height: var(--cell);
        background: #222;
        border: 1px solid #333;
      }
      .player {
        background: #00aaff !important;
      }

      .enemy {
        background: #ff2244 !important;
      }
    </style>
  </head>
  <body>
    <div id="grid"></div>
  </body>
</html>
