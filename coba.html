    <script>
      // =====================
      // GAME LOOP
      // =====================
      let spawnTimer = 0;
      function loop() {
        if (!state.running || state.paused) return;

        // waktu sekarang
        const now = performance.now();

        // delta time
        const delta = (now - lastTime) / 1000;
        // simpan frame sekarang
        lastTime = now;
        // tambah waktu spawn
        spawnTimer += delta;
        // kalau sudah waktunya spawn
        if (
          spawnTimer >= getSpawnDelay() &&
          state.enemies.length < getMaxEnemies()
        ) {
          spawnEnemy();

          spawnTimer = 0;
        }
        // ======================
        // UPDATE GAME
        // ======================

        updateEnemies(delta);

        // checkCollision();
        console.log(state.enemies.length);
        render();

        // ======================
        // FRAME BERIKUTNYA
        // ======================

        requestAnimationFrame(loop);
      }

      // =====================
      // INIT
      // =====================
      buildGrid();
      spawnEnemy();
      render();
      loop();
    </script>
