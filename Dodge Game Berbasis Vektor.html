<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GRID::DODGE — Survival Protocol</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  /* ============================================================
     CSS VARIABLES & RESET
     ============================================================ */
  :root {
    --bg:          #020810;
    --grid-bg:     #050f1c;
    --grid-line:   #0a2040;
    --cell-hover:  #071828;
    --player:      #00aaff;
    --player-glow: #0066cc;
    --enemy:       #ff2244;
    --enemy-glow:  #cc0022;
    --accent:      #00ffcc;
    --text:        #8ab8d4;
    --text-bright: #cce8ff;
    --hud-bg:      rgba(5, 15, 30, 0.85);
    --border:      #0a3060;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    user-select: none;
  }

  /* Animated scanlines overlay */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.07) 2px,
      rgba(0,0,0,0.07) 4px
    );
    pointer-events: none;
    z-index: 999;
  }

  /* Radial background glow */
  body::after {
    content: '';
    position: fixed;
    width: 800px; height: 800px;
    background: radial-gradient(ellipse, rgba(0,60,120,0.25) 0%, transparent 70%);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    z-index: 0;
  }

  /* ============================================================
     HEADER / TITLE
     ============================================================ */
  header {
    position: relative; z-index: 10;
    text-align: center;
    margin-bottom: 18px;
  }

  header h1 {
    font-family: 'Orbitron', monospace;
    font-size: clamp(1.4rem, 4vw, 2.2rem);
    font-weight: 900;
    letter-spacing: 0.18em;
    color: var(--accent);
    text-shadow: 0 0 20px rgba(0,255,204,0.7), 0 0 60px rgba(0,255,204,0.3);
    animation: flicker 6s infinite;
  }

  header p {
    font-size: 0.65rem;
    letter-spacing: 0.25em;
    color: var(--text);
    margin-top: 4px;
    opacity: 0.7;
  }

  @keyframes flicker {
    0%,95%,100% { opacity: 1; }
    96% { opacity: 0.6; }
    97% { opacity: 1; }
    98% { opacity: 0.4; }
    99% { opacity: 1; }
  }

  /* ============================================================
     HUD — SCORE & STATUS
     ============================================================ */
  #hud {
    display: flex;
    gap: 24px;
    margin-bottom: 14px;
    position: relative; z-index: 10;
  }

  .hud-box {
    background: var(--hud-bg);
    border: 1px solid var(--border);
    padding: 8px 18px;
    clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
    text-align: center;
  }

  .hud-label {
    font-size: 0.55rem;
    letter-spacing: 0.3em;
    color: var(--text);
    opacity: 0.6;
    display: block;
  }

  .hud-value {
    font-family: 'Orbitron', monospace;
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--accent);
    text-shadow: 0 0 12px rgba(0,255,204,0.6);
  }

  /* ============================================================
     GAME CONTAINER + GRID
     ============================================================ */
  #game-container {
    position: relative; z-index: 10;
  }

  /* Outer frame with corner brackets */
  #game-frame {
    padding: 10px;
    background: linear-gradient(135deg, #030d1a 0%, #050f22 100%);
    border: 1px solid var(--border);
    box-shadow:
      0 0 40px rgba(0,100,200,0.2),
      0 0 80px rgba(0,50,100,0.1),
      inset 0 0 30px rgba(0,30,80,0.5);
    position: relative;
  }

  /* Corner decorations */
  #game-frame::before, #game-frame::after {
    content: '';
    position: absolute;
    width: 16px; height: 16px;
    border-color: var(--accent);
    border-style: solid;
  }
  #game-frame::before {
    top: 4px; left: 4px;
    border-width: 2px 0 0 2px;
  }
  #game-frame::after {
    bottom: 4px; right: 4px;
    border-width: 0 2px 2px 0;
  }

  /* 10×10 Grid */
  #grid {
    display: grid;
    grid-template-columns: repeat(10, 1fr);
    grid-template-rows: repeat(10, 1fr);
    gap: 2px;
    width: min(90vw, 500px);
    height: min(90vw, 500px);
    background: var(--grid-line);
  }

  /* Individual cell */
  .cell {
    background: var(--grid-bg);
    position: relative;
    transition: background 0.08s;
  }

  /* Subtle checker shading every other cell */
  .cell:nth-child(odd) { background: #060f1e; }

  /* ============================================================
     PLAYER CELL
     ============================================================ */
  .cell.player {
    background: var(--player-glow) !important;
    box-shadow:
      inset 0 0 12px rgba(0,170,255,0.8),
      0 0 16px rgba(0,170,255,0.9),
      0 0 30px rgba(0,100,200,0.5);
    animation: playerPulse 1.2s ease-in-out infinite;
  }

  .cell.player::after {
    content: '';
    position: absolute;
    inset: 25%;
    background: var(--player);
    border-radius: 50%;
    box-shadow: 0 0 8px var(--player), 0 0 20px rgba(0,170,255,0.8);
  }

  @keyframes playerPulse {
    0%,100% { box-shadow: inset 0 0 12px rgba(0,170,255,0.8), 0 0 16px rgba(0,170,255,0.9), 0 0 30px rgba(0,100,200,0.5); }
    50%      { box-shadow: inset 0 0 18px rgba(0,170,255,1),   0 0 28px rgba(0,170,255,1),   0 0 50px rgba(0,130,255,0.6); }
  }

  /* ============================================================
     ENEMY CELL
     ============================================================ */
  .cell.enemy {
    background: #2a0008 !important;
    box-shadow:
      inset 0 0 10px rgba(255,30,60,0.8),
      0 0 14px rgba(255,20,50,0.9),
      0 0 28px rgba(200,0,30,0.5);
  }

  .cell.enemy::after {
    content: '';
    position: absolute;
    inset: 20%;
    background: var(--enemy);
    clip-path: polygon(50% 0%, 100% 100%, 0% 100%);
    box-shadow: 0 0 8px var(--enemy);
    animation: enemyRot 0.8s linear infinite;
  }

  @keyframes enemyRot {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  /* ============================================================
     OVERLAY: START / GAME OVER
     ============================================================ */
  #overlay {
    position: absolute;
    inset: 0;
    background: rgba(2, 8, 16, 0.92);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    z-index: 20;
    backdrop-filter: blur(3px);
  }

  #overlay.hidden { display: none; }

  #overlay-title {
    font-family: 'Orbitron', monospace;
    font-size: clamp(1.2rem, 5vw, 2rem);
    font-weight: 900;
    letter-spacing: 0.15em;
    text-align: center;
  }

  #overlay-title.gameover { color: var(--enemy); text-shadow: 0 0 20px rgba(255,30,60,0.8); }
  #overlay-title.start    { color: var(--accent); text-shadow: 0 0 20px rgba(0,255,204,0.8); }

  #overlay-score {
    font-size: 1rem;
    color: var(--text-bright);
    letter-spacing: 0.15em;
  }

  #overlay-info {
    font-size: 0.65rem;
    color: var(--text);
    opacity: 0.7;
    letter-spacing: 0.15em;
    text-align: center;
    line-height: 2;
  }

  /* Restart / Start button */
  #btn-start {
    font-family: 'Orbitron', monospace;
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 0.2em;
    color: var(--bg);
    background: var(--accent);
    border: none;
    padding: 12px 32px;
    clip-path: polygon(12px 0%, 100% 0%, calc(100% - 12px) 100%, 0% 100%);
    cursor: pointer;
    transition: background 0.2s, box-shadow 0.2s, transform 0.1s;
    box-shadow: 0 0 20px rgba(0,255,204,0.5);
  }

  #btn-start:hover {
    background: #33ffdd;
    box-shadow: 0 0 30px rgba(0,255,204,0.8);
    transform: scale(1.03);
  }
  #btn-start:active { transform: scale(0.97); }

  /* ============================================================
     CONTROLS LEGEND
     ============================================================ */
  #controls {
    display: flex;
    gap: 8px;
    margin-top: 12px;
    position: relative; z-index: 10;
  }

  .key {
    background: #060f20;
    border: 1px solid var(--border);
    color: var(--accent);
    font-family: 'Orbitron', monospace;
    font-size: 0.6rem;
    padding: 4px 8px;
    letter-spacing: 0.1em;
  }

  /* ============================================================
     DIFFICULTY INDICATOR
     ============================================================ */
  #diff-bar-wrap {
    margin-top: 10px;
    position: relative; z-index: 10;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    opacity: 0.8;
  }

  #diff-bar {
    width: 120px;
    height: 4px;
    background: #0a1e30;
    border: 1px solid var(--border);
    overflow: hidden;
  }

  #diff-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--enemy));
    width: 0%;
    transition: width 1s linear;
  }
</style>
</head>
<body>

<!-- Title -->
<header>
  <h1>GRID::DODGE</h1>
  <p>SURVIVAL PROTOCOL — SECTOR 7</p>
</header>

<!-- HUD -->
<div id="hud">
  <div class="hud-box">
    <span class="hud-label">SCORE</span>
    <span class="hud-value" id="hud-score">0000</span>
  </div>
  <div class="hud-box">
    <span class="hud-label">TIME</span>
    <span class="hud-value" id="hud-time">00:00</span>
  </div>
  <div class="hud-box">
    <span class="hud-label">THREATS</span>
    <span class="hud-value" id="hud-enemies">00</span>
  </div>
</div>

<!-- Game area -->
<div id="game-container">
  <div id="game-frame">
    <div id="grid"></div>

    <!-- Overlay (start / game over) -->
    <div id="overlay">
      <div id="overlay-title" class="start">GRID::DODGE</div>
      <div id="overlay-score"></div>
      <div id="overlay-info">
        MOVE WITH WASD OR ARROW KEYS<br>
        AVOID THE RED THREATS<br>
        SURVIVE AS LONG AS POSSIBLE
      </div>
      <button id="btn-start">INITIALIZE</button>
    </div>
  </div>
</div>

<!-- Controls legend -->
<div id="controls">
  <span class="key">W</span>
  <span class="key">A</span>
  <span class="key">S</span>
  <span class="key">D</span>
  <span style="color:var(--text);font-size:0.6rem;letter-spacing:0.15em;padding:4px">OR</span>
  <span class="key">↑</span>
  <span class="key">←</span>
  <span class="key">↓</span>
  <span class="key">→</span>
</div>

<!-- Difficulty bar -->
<div id="diff-bar-wrap">
  <span>THREAT LEVEL</span>
  <div id="diff-bar"><div id="diff-fill"></div></div>
</div>

<script>
/* ================================================================
   GRID::DODGE — SURVIVAL PROTOCOL
   ================================================================
   Structure:
     1. CONFIG        — tunable constants
     2. STATE         — all mutable game data
     3. DATA HELPERS  — pure functions on state
     4. LOGIC         — update / movement / collision
     5. RENDERING     — DOM sync
     6. INPUT         — keyboard handling
     7. GAME LOOP     — orchestrator
     8. INIT          — bootstrap
   ================================================================ */


/* ================================================================
   1. CONFIG
   ================================================================ */
const CONFIG = {
  GRID_SIZE:        10,      // 10×10 grid
  PLAYER_START:     { x: 4, y: 4 },

  // Loop timing
  GAME_TICK_MS:     120,     // enemy move interval (ms)
  SCORE_TICK_MS:    100,     // score update interval (ms)
  SCORE_PER_TICK:   1,       // score added each tick

  // Spawning
  SPAWN_INTERVAL_MS:  800,   // base time between enemy spawns
  SPAWN_MIN_MS:       300,   // fastest possible spawn rate
  DIFFICULTY_RAMP:    5000,  // every N ms, spawn gets faster by RAMP_STEP
  RAMP_STEP:          40,    // ms reduction per ramp event
};


/* ================================================================
   2. STATE
   ================================================================ */
let state = {
  // Player position {x, y}  (0-indexed, col/row)
  player: { ...CONFIG.PLAYER_START },

  // Array of enemy objects: { x, y, vx, vy }
  enemies: [],

  // Scoring & timing
  score:      0,
  elapsed:    0,   // ms since game start

  // Pending movement from keyboard buffer
  pendingMove: null,

  // Whether game is active
  running: false,

  // Interval handles
  _gameTick:    null,
  _scoreTick:   null,
  _spawnTick:   null,
  _diffTick:    null,

  // Current spawn interval (decreases with difficulty)
  spawnInterval: CONFIG.SPAWN_INTERVAL_MS,
};


/* ================================================================
   3. DATA HELPERS
   ================================================================ */

/** Returns true if (x,y) is inside the grid */
function inBounds(x, y) {
  return x >= 0 && x < CONFIG.GRID_SIZE &&
         y >= 0 && y < CONFIG.GRID_SIZE;
}

/** Unique cell index from (col, row) → used to address DOM cells */
function cellIndex(x, y) {
  return y * CONFIG.GRID_SIZE + x;
}

/** Generate a random spawn point on the grid edge
 *  Always spawns on left edge (x=0) moving right (+1), per spec.
 *  Variation: random row on the left edge. */
function spawnEnemy() {
  const row = Math.floor(Math.random() * CONFIG.GRID_SIZE);
  return { x: 0, y: row, vx: 1, vy: 0 };
}

/** Format milliseconds as mm:ss */
function formatTime(ms) {
  const s = Math.floor(ms / 1000);
  const m = Math.floor(s / 60);
  return `${String(m).padStart(2,'0')}:${String(s % 60).padStart(2,'0')}`;
}

/** Pad number with leading zeros to 4 digits */
function padScore(n) {
  return String(n).padStart(4, '0');
}


/* ================================================================
   4. LOGIC
   ================================================================ */

/** Apply buffered player movement (called each game tick) */
function updatePlayer() {
  if (!state.pendingMove) return;
  const { dx, dy } = state.pendingMove;
  state.pendingMove = null;

  const nx = state.player.x + dx;
  const ny = state.player.y + dy;
  if (inBounds(nx, ny)) {
    state.player.x = nx;
    state.player.y = ny;
  }
}

/** Move all enemies one step; remove those that left the grid */
function updateEnemies() {
  state.enemies = state.enemies.filter(e => {
    e.x += e.vx;
    e.y += e.vy;
    return inBounds(e.x, e.y); // keep only in-bounds enemies
  });
}

/** Check if player occupies the same cell as any enemy */
function checkCollision() {
  return state.enemies.some(
    e => e.x === state.player.x && e.y === state.player.y
  );
}

/** One full game tick: move → check collision */
function gameTick() {
  updatePlayer();
  updateEnemies();

  if (checkCollision()) {
    endGame();
    return;
  }

  // Re-check collision after player may have moved onto an enemy
  // (edge case: enemy was already there before move)
  render();
}

/** Spawn a new enemy and restart spawn timer with current interval */
function spawnAndReschedule() {
  if (!state.running) return;

  state.enemies.push(spawnEnemy());
  render(); // immediate redraw to show new enemy

  // Reschedule (interval may have changed due to difficulty ramp)
  clearTimeout(state._spawnTick);
  state._spawnTick = setTimeout(spawnAndReschedule, state.spawnInterval);
}

/** Difficulty ramp: shrink spawn interval over time */
function difficultyRamp() {
  state.spawnInterval = Math.max(
    CONFIG.SPAWN_MIN_MS,
    state.spawnInterval - CONFIG.RAMP_STEP
  );
  updateDiffBar();
}


/* ================================================================
   5. RENDERING
   ================================================================ */

// Cache DOM cell elements for fast lookup
const cells = [];

/** Build the 10×10 grid in the DOM once */
function buildGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  cells.length = 0;

  for (let row = 0; row < CONFIG.GRID_SIZE; row++) {
    for (let col = 0; col < CONFIG.GRID_SIZE; col++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      grid.appendChild(cell);
      cells.push(cell);
    }
  }
}

/** Sync DOM to current state (player + enemies) */
function render() {
  // Clear all special classes efficiently
  cells.forEach(c => { c.className = 'cell'; });

  // Draw enemies first (player draws on top if overlap)
  state.enemies.forEach(e => {
    if (inBounds(e.x, e.y)) {
      cells[cellIndex(e.x, e.y)].classList.add('enemy');
    }
  });

  // Draw player
  cells[cellIndex(state.player.x, state.player.y)].classList.add('player');

  // Update HUD
  document.getElementById('hud-score').textContent   = padScore(state.score);
  document.getElementById('hud-time').textContent    = formatTime(state.elapsed);
  document.getElementById('hud-enemies').textContent = String(state.enemies.length).padStart(2,'0');
}

/** Update the difficulty bar width (0–100%) */
function updateDiffBar() {
  const range = CONFIG.SPAWN_INTERVAL_MS - CONFIG.SPAWN_MIN_MS;
  const gone  = CONFIG.SPAWN_INTERVAL_MS - state.spawnInterval;
  const pct   = Math.min(100, (gone / range) * 100);
  document.getElementById('diff-fill').style.width = pct + '%';
}

/** Show game over overlay with final score */
function showGameOver() {
  const overlay = document.getElementById('overlay');
  overlay.classList.remove('hidden');

  document.getElementById('overlay-title').className = 'gameover';
  document.getElementById('overlay-title').textContent = 'TERMINATED';
  document.getElementById('overlay-score').textContent =
    `FINAL SCORE: ${padScore(state.score)}  |  TIME: ${formatTime(state.elapsed)}`;
  document.getElementById('overlay-info').innerHTML =
    'THREAT COLLISION DETECTED<br>PROTOCOL TERMINATED';
  document.getElementById('btn-start').textContent = 'REINITIALIZE';
}

/** Hide overlay and show game */
function hideOverlay() {
  document.getElementById('overlay').classList.add('hidden');
}


/* ================================================================
   6. INPUT
   ================================================================ */
const KEY_MAP = {
  ArrowUp:    { dx:  0, dy: -1 },
  ArrowDown:  { dx:  0, dy:  1 },
  ArrowLeft:  { dx: -1, dy:  0 },
  ArrowRight: { dx:  1, dy:  0 },
  w: { dx:  0, dy: -1 },
  s: { dx:  0, dy:  1 },
  a: { dx: -1, dy:  0 },
  d: { dx:  1, dy:  0 },
  W: { dx:  0, dy: -1 },
  S: { dx:  0, dy:  1 },
  A: { dx: -1, dy:  0 },
  D: { dx:  1, dy:  0 },
};

document.addEventListener('keydown', e => {
  if (KEY_MAP[e.key]) {
    e.preventDefault(); // prevent page scroll
    if (state.running) {
      state.pendingMove = KEY_MAP[e.key];
    }
  }
});


/* ================================================================
   7. GAME LOOP — start / end
   ================================================================ */

/** Start or restart the game */
function startGame() {
  // Reset state
  state.player       = { ...CONFIG.PLAYER_START };
  state.enemies      = [];
  state.score        = 0;
  state.elapsed      = 0;
  state.pendingMove  = null;
  state.running      = true;
  state.spawnInterval = CONFIG.SPAWN_INTERVAL_MS;

  // Clear any existing intervals
  stopAllTimers();

  hideOverlay();
  updateDiffBar();
  render();

  // Main game tick (movement + collision check)
  state._gameTick = setInterval(() => {
    if (!state.running) return;
    gameTick();
  }, CONFIG.GAME_TICK_MS);

  // Score ticker (time-based scoring)
  const scoreStart = performance.now();
  state._scoreTick = setInterval(() => {
    if (!state.running) return;
    state.elapsed = performance.now() - scoreStart;
    state.score  += CONFIG.SCORE_PER_TICK;
    // Update HUD without full render (performance)
    document.getElementById('hud-score').textContent = padScore(state.score);
    document.getElementById('hud-time').textContent  = formatTime(state.elapsed);
  }, CONFIG.SCORE_TICK_MS);

  // Enemy spawn (self-rescheduling timeout for dynamic interval)
  state._spawnTick = setTimeout(spawnAndReschedule, state.spawnInterval);

  // Difficulty ramp
  state._diffTick = setInterval(difficultyRamp, CONFIG.DIFFICULTY_RAMP);
}

/** End the game on collision */
function endGame() {
  state.running = false;
  stopAllTimers();
  render(); // Final render showing collision state
  showGameOver();
}

/** Clear all active timers */
function stopAllTimers() {
  clearInterval(state._gameTick);
  clearInterval(state._scoreTick);
  clearInterval(state._diffTick);
  clearTimeout(state._spawnTick);
}


/* ================================================================
   8. INIT
   ================================================================ */

/** Bootstrap: build grid and wire up button */
function init() {
  buildGrid();

  document.getElementById('btn-start').addEventListener('click', startGame);

  // Initial render (empty state)
  render();
}

init();
</script>
</body>
</html>
