<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Doggy Dodge</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap"
      rel="stylesheet"
    />

    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --cream: #fdf6ee;
        --warm-white: #fff9f2;
        --sand: #f0e4d0;
        --caramel: #d4956a;
        --caramel-lt: #e8b48a;
        --rust: #c26a3a;
        --mocha: #7a4f35;
        --sage-lt: #b2c9b4;
        --sage-dk: #5c7a5e;
        --blush: #e8a0a0;
        --blush-dk: #c46060;
        --shadow: rgba(122, 79, 53, 0.12);
        --shadow-md: rgba(122, 79, 53, 0.2);
        --text-dark: #4a3525;
        --text-mid: #7a5a40;
        --text-light: #a17353;
        --cell-bg: #f5ead8;
        --cell-hover: #ecd8be;
        --grid-bg: #ede0cc;
      }

      body {
        font-family: 'Nunito', sans-serif;
        min-height: 100vh;
        background: #d6cfc8;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 32px 20px;
        color: var(--text-dark);
      }
      /* ── Header ── */
      .header {
        text-align: center;
        margin-bottom: 18px;
      }

      .header-eyebrow {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.25em;
        text-transform: uppercase;
        color: var(--text-light);
        margin-bottom: 4px;
      }

      .header-title {
        font-family: 'Nunito', sans-serif;
        font-size: 38px;
        font-weight: 900;
        color: var(--mocha);
        letter-spacing: -0.5px;
        line-height: 1;
      }

      .header-title span {
        color: var(--caramel);
      }

      .header-subtitle {
        font-size: 13px;
        font-weight: 600;
        color: var(--text-light);
        margin-top: 6px;
        letter-spacing: 0.05em;
      }

      /* ── Widget Card ── */
      .widget {
        background: var(--warm-white);
        border: 1.5px solid var(--sand);
        border-radius: 16px;
        padding: 14px;
        box-shadow: 0 2px 10px var(--shadow);
        transition:
          transform 0.2s,
          box-shadow 0.2s;
      }
      .widget:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 16px var(--shadow-md);
      }
      .widget-label {
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--text-light);
        margin-bottom: 8px;
      }

      /* ── Left Panel ── */
      .left-panel {
        display: flex;
        flex-direction: column;
        gap: 12px;
        width: 148px;
        flex-shrink: 0;
      }
      .stat-widget {
        text-align: center;
      }

      .stat-icon {
        font-size: 18px;
        display: block;
        margin-bottom: 4px;
      }

      .stat-value {
        font-size: 30px;
        font-weight: 900;
        line-height: 1;
        color: var(--mocha);
      }

      .stat-widget.score .stat-value {
        color: var(--rust);
      }
      .stat-widget.time .stat-value {
        color: var(--sage-dk);
      }
      .stat-widget.level .stat-value {
        color: var(--caramel);
      }

      /* ── Right Panel ── */
      .right-panel {
        display: flex;
        flex-direction: column;
        gap: 12px;
        width: 148px;
        flex-shrink: 0;
        align-items: center;
      }
      /* D-Pad */
      .dpad {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        grid-template-rows: repeat(3, 1fr);
        gap: 6px;
        margin-top: 4px;
      }

      .dpad-btn {
        aspect-ratio: 1;
        background: var(--warm-white);
        border: 1.5px solid var(--sand);
        border-bottom: 3px solid var(--linen-dk, #cfc5b8);
        border-radius: 12px;
        font-size: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        color: var(--text-dark);
        box-shadow: 0 2px 6px var(--shadow);
        transition:
          transform 0.08s,
          background 0.08s;
        user-select: none;
        -webkit-user-select: none;
      }

      .dpad-btn:active,
      .dpad-btn.pressed {
        transform: translateY(2px);
        background: var(--sand);
        border-bottom-width: 1px;
      }

      .dpad-btn.empty {
        background: transparent;
        border: none;
        box-shadow: none;
        pointer-events: none;
      }

      .info-lines {
        font-size: 11px;
        font-weight: 600;
        color: var(--text-light);
        line-height: 2;
      }

      /* ── Layout ── */
      .main-layout {
        display: flex;
        gap: 16px;
        align-items: flex-start;
        justify-content: center;
        width: 100%;
        max-width: 960px;
      }

      #grid-container {
        display: grid;
        gap: 2px;
        background: var(--grid-bg);

        border-radius: 22px;
        box-shadow:
          0 4px 28px var(--shadow-md),
          inset 0 1px 0 rgba(255, 255, 255, 0.6);
        justify-content: center;
        align-content: center;
        width: 80vmin;
        height: 80vmin;
        padding: 5vmin;
      }

      .cell {
        background: var(--cell-bg);
        border-radius: 6px;
        border: 1px solid var(--cell-hover);
        aspect-ratio: 1/1;
      }
      .cell:hover {
        background: var(--cell-hover);
      }
      .cell:nth-child(7n + 3) {
        background: #f7eedd;
      }
      .cell:nth-child(11n + 5) {
        background: #f2e5cc;
      }
      .player {
        /* background: #00aaff !important; */
        /* background: var(--sage-lt); */
        background: url(./assets/img/player.svg) !important;
        box-shadow:
          0 0 0 2px var(--sage-dk),
          0 2px 8px rgba(92, 122, 94, 0.25);
        z-index: 3;
        transition: all 0.15s;
      }

      .enemy {
        /* background: #ff2244 !important; */
        z-index: 2;

        /* background: #fce8e8 !important; */
        background: url(./assets/img/enemy-red.svg) !important;
        box-shadow:
          0 0 0 2px var(--blush-dk),
          0 2px 8px rgba(196, 96, 96, 0.2);
        transition: all 0.1s;
      }
    </style>
  </head>
  <body>
    <!-- Header -->
    <header class="header">
      <p class="header-eyebrow">penugasan kalkulus lanjut</p>
      <h1 class="header-title">Doggy <span>Dodge</span></h1>
      <p class="header-subtitle">
        🐾 &nbsp;Selamatkan Dirimu dari Doggy Galak &nbsp;🐾
      </p>
    </header>

    <div class="main-layout">
      <div class="left-panel">
        <div class="widget stat-widget score">
          <div class="widget-label">High Score</div>
          <span class="stat-icon">🏆</span>
          <div class="stat-value" id="high-score">0</div>
        </div>
        <div class="widget stat-widget score">
          <div class="widget-label">Score</div>
          <div class="stat-value" id="score">0</div>
        </div>
        <div class="widget stat-widget time">
          <div class="widget-label">Waktu</div>
          <span class="stat-icon">🕐</span>
          <div class="stat-value" id="time">00:00</div>
        </div>
      </div>

      <!-- game -->
      <div id="grid-container"></div>

      <!-- Right Panel -->
      <div class="right-panel">
        <div class="widget" style="width: 100%; text-align: center">
          <div class="widget-label">Nyawa</div>
          <div class="lives-dots">
            <div class="life-dot"></div>
            <div class="life-dot"></div>
            <div class="life-dot"></div>
            <div class="life-dot empty"></div>
            <div class="life-dot empty"></div>
          </div>
        </div>

        <div class="widget" style="width: 100%">
          <div class="widget-label">Kontrol</div>
          <div class="dpad">
            <div class="dpad-btn empty"></div>
            <div class="dpad-btn" onmousedown="pressBtn(this, 'up')">▲</div>
            <div class="dpad-btn empty"></div>

            <div class="dpad-btn" onmousedown="pressBtn(this, 'left')">◀</div>
            <div class="dpad-btn empty"></div>
            <div class="dpad-btn" onmousedown="pressBtn(this, 'right')">▶</div>

            <div class="dpad-btn empty"></div>
            <div class="dpad-btn" onmousedown="pressBtn(this, 'down')">▼</div>
            <div class="dpad-btn empty"></div>
          </div>
        </div>
      </div>
    </div>
    <script src="js/varible.js"></script>
    <script>
      // ======================================
      // WAKTU MULAI GAME
      // ======================================
      state.startTime = performance.now();
      // ======================================
      // AMBIL LAMA WAKTU BERMAIN (DETIK)
      // ======================================
      function getElapsedSeconds() {
        return (performance.now() - state.startTime) / 1000;
      }
    </script>
    <script src="js/grid.js"></script>
    <script src="js/player.js"></script>
    <script src="js/eventlistener.js"></script>
    <script src="js/enemies.js"></script>
    <script src="js/score.js"></script>
    <script src="js/time.js"></script>
    <script src="js/render.js"></script>

    <script>
      // =====================
      // GAME LOOP
      // =====================
      let spawnTimer = 0;
      function loop() {
        if (!state.running || state.paused) return;

        // waktu sekarang
        const now = performance.now();

        // delta time
        const delta = (now - lastTime) / 1000;
        // simpan frame sekarang
        lastTime = now;
        // tambah waktu spawn
        spawnTimer += delta;
        // kalau sudah waktunya spawn
        if (
          spawnTimer >= getSpawnDelay() &&
          state.enemies.length < getMaxEnemies()
        ) {
          spawnEnemy();

          spawnTimer = 0;
        }

        updateTime(delta);

        updateScore(delta);

        updateEnemies(delta);

        // checkCollision();
        console.log(state.enemies.length);
        render();
        // playerUseSVG();
        // ======================
        // FRAME BERIKUTNYA
        // ======================

        requestAnimationFrame(loop);
      }

      // =====================
      // INIT
      // =====================
      buildGrid();
      spawnEnemy();
      render();
      loop();
    </script>
  </body>
</html>
