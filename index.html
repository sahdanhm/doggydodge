<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Paw Patrol: Dodge - Start</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <style>
      /* ── Reset & Base ── */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --cream: #fdf6ee;
        --warm-white: #fff9f2;
        --sand: #f0e4d0;
        --caramel: #d4956a;
        --caramel-lt: #e8b48a;
        --rust: #c26a3a;
        --mocha: #7a4f35;
        --sage: #8eab90;
        --sage-lt: #b2c9b4;
        --sage-dk: #5c7a5e;
        --blush: #e8a0a0;
        --blush-dk: #c46060;
        --shadow: rgba(122, 79, 53, 0.12);
        --shadow-md: rgba(122, 79, 53, 0.2);
        --text-dark: #4a3525;
        --text-mid: #7a5a40;
        --text-light: #a17353;
        --cell-bg: #f5ead8;
        --cell-hover: #ecd8be;
        --grid-bg: #ede0cc;
      }

      body {
        font-family: 'Nunito', sans-serif;
        background-color: var(--cream);
        color: var(--text-dark);

        height: 100vh;
        overflow: hidden;

        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;

        padding: 12px;

        background-image:
          radial-gradient(
            circle at 15% 20%,
            rgba(212, 149, 106, 0.1) 0%,
            transparent 50%
          ),
          radial-gradient(
            circle at 85% 75%,
            rgba(142, 171, 144, 0.1) 0%,
            transparent 50%
          );
      }

      /* ── Header ── */
      .header {
        text-align: center;
        margin-bottom: 20px;
      }

      .header-eyebrow {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.25em;
        text-transform: uppercase;
        color: var(--text-light);
        margin-bottom: 4px;
      }

      .header-title {
        font-size: 38px;
        font-weight: 900;
        color: var(--mocha);
        letter-spacing: -0.5px;
        line-height: 1;
      }

      .header-title span {
        color: var(--caramel);
      }

      .header-subtitle {
        font-size: 13px;
        font-weight: 600;
        color: var(--text-light);
        margin-top: 6px;
        letter-spacing: 0.05em;
      }

      .paw-deco {
        display: inline-block;
        font-size: 16px;
        margin: 0 6px;
        opacity: 0.5;
      }

      /* ── HUD ── */
      .hud {
        display: flex;
        gap: 12px;
        margin-bottom: 16px;
        flex-wrap: wrap;
        justify-content: center;
      }

      .hud-card {
        background: var(--warm-white);
        border: 1.5px solid var(--sand);
        border-radius: 14px;
        padding: 10px 20px;
        min-width: 110px;
        text-align: center;
        box-shadow: 0 2px 10px var(--shadow);
        transition:
          transform 0.2s ease,
          box-shadow 0.2s ease;
      }

      .hud-card:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 16px var(--shadow-md);
      }

      .hud-label {
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--text-light);
        margin-bottom: 2px;
      }

      .hud-value {
        font-size: 26px;
        font-weight: 900;
        color: var(--mocha);
        line-height: 1;
      }

      .hud-card.score .hud-value {
        color: var(--rust);
      }
      .hud-card.time .hud-value {
        color: var(--sage-dk);
      }
      .hud-card.level .hud-value {
        color: var(--caramel);
      }

      .hud-icon {
        font-size: 13px;
        display: block;
        margin-bottom: 3px;
      }

      /* ── Game Wrapper ── */
      .game-wrapper {
        position: relative;
        display: inline-block;
      }

      /* ── Grid ── */
      .grid-container {
        display: grid;
        grid-template-columns: repeat(10, 1fr);
        grid-template-rows: repeat(10, 1fr);

        gap: 5px;
        padding: 14px;

        width: min(65vmin, 420px);
        height: min(65vmin, 420px);

        background: var(--grid-bg);
        border-radius: 20px;

        box-shadow:
          0 4px 24px var(--shadow-md),
          inset 0 1px 0 rgba(255, 255, 255, 0.6);
      }

      /* ── Cells ── */
      .cell {
        background: var(--cell-bg);
        border-radius: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.15s ease;
        position: relative;
        overflow: hidden;
      }

      .cell:hover {
        background: var(--cell-hover);
      }

      /* Accent cells for subtle texture */
      .cell:nth-child(7n + 3) {
        background: #f7eedd;
      }
      .cell:nth-child(11n + 5) {
        background: #f2e5cc;
      }

      /* ── Player Cell ── */
      .cell.player {
        background: var(--sage-lt);
        box-shadow:
          0 0 0 2px var(--sage-dk),
          0 2px 8px rgba(92, 122, 94, 0.25);
        border-radius: 8px;
        z-index: 2;
      }

      .cell.player img {
        width: 78%;
        height: 78%;
        object-fit: contain;
        image-rendering: pixelated;
      }

      /* ── Enemy Cells ── */
      .cell.enemy {
        border-radius: 8px;
        z-index: 2;
      }

      .cell.enemy-red {
        background: #fce8e8;
        box-shadow:
          0 0 0 2px var(--blush-dk),
          0 2px 8px rgba(196, 96, 96, 0.2);
      }

      .cell.enemy-orange {
        background: #fdf0e0;
        box-shadow:
          0 0 0 2px var(--caramel),
          0 2px 8px rgba(212, 149, 106, 0.2);
      }

      .cell.enemy-dark {
        background: #ede0d4;
        box-shadow:
          0 0 0 2px var(--mocha),
          0 2px 8px rgba(122, 79, 53, 0.2);
      }

      .cell.enemy img {
        width: 78%;
        height: 78%;
        object-fit: contain;
        image-rendering: pixelated;
      }

      /* ── Overlay ── */
      .overlay {
        position: absolute;
        inset: 0;
        border-radius: 20px;
        background: rgba(253, 246, 238, 0.92);
        backdrop-filter: blur(6px);
        -webkit-backdrop-filter: blur(6px);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
        z-index: 10;
        padding: 32px;
      }

      .overlay-badge {
        background: var(--caramel-lt);
        color: var(--mocha);
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        padding: 5px 14px;
        border-radius: 20px;
      }

      .overlay-title {
        font-size: 34px;
        font-weight: 900;
        color: var(--mocha);
        text-align: center;
        line-height: 1.15;
      }

      .overlay-title em {
        font-style: normal;
        color: var(--rust);
      }

      .overlay-desc {
        font-size: 14px;
        font-weight: 600;
        color: var(--text-mid);
        text-align: center;
        line-height: 1.6;
        max-width: 260px;
      }

      .overlay-controls {
        display: flex;
        gap: 10px;
        align-items: center;
        flex-wrap: wrap;
        justify-content: center;
      }

      .key-badge {
        background: var(--warm-white);
        border: 1.5px solid var(--sand);
        border-bottom-width: 3px;
        border-radius: 8px;
        padding: 4px 10px;
        font-size: 13px;
        font-weight: 800;
        color: var(--text-dark);
        box-shadow: 0 1px 4px var(--shadow);
        min-width: 32px;
        text-align: center;
      }

      .controls-label {
        font-size: 12px;
        font-weight: 600;
        color: var(--text-light);
      }

      /* ── Buttons ── */
      .btn-primary {
        background: linear-gradient(145deg, var(--caramel-lt), var(--caramel));
        color: #fff;
        font-family: 'Nunito', sans-serif;
        font-size: 16px;
        font-weight: 800;
        border: none;
        border-radius: 14px;
        padding: 13px 40px;
        cursor: pointer;
        box-shadow:
          0 4px 0 var(--rust),
          0 6px 16px rgba(212, 149, 106, 0.35);
        transition:
          transform 0.12s ease,
          box-shadow 0.12s ease;
        letter-spacing: 0.03em;
      }

      .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow:
          0 6px 0 var(--rust),
          0 10px 20px rgba(212, 149, 106, 0.4);
      }

      .btn-primary:active {
        transform: translateY(2px);
        box-shadow:
          0 2px 0 var(--rust),
          0 4px 10px rgba(212, 149, 106, 0.3);
      }

      /* ── Lives Display ── */
      .lives-row {
        display: flex;
        gap: 5px;
        justify-content: center;
        margin-top: -4px;
      }

      .life-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: var(--blush);
        border: 1.5px solid var(--blush-dk);
      }

      .life-dot.empty {
        background: transparent;
        border-color: var(--sand);
      }

      /* ── Footer Controls Hint ── */
      .footer-hint {
        margin-top: 14px;
        text-align: center;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        flex-wrap: wrap;
      }

      .hint-keys {
        display: flex;
        gap: 5px;
      }

      .hint-key {
        background: var(--warm-white);
        border: 1.5px solid var(--sand);
        border-bottom-width: 2.5px;
        border-radius: 6px;
        padding: 2px 8px;
        font-size: 11px;
        font-weight: 800;
        color: var(--text-mid);
        box-shadow: 0 1px 3px var(--shadow);
      }

      .hint-sep {
        font-size: 11px;
        color: var(--text-light);
        font-weight: 600;
      }

      /* ── Threat legend ── */
      .legend {
        display: flex;
        gap: 14px;
        margin-top: 14px;
        flex-wrap: wrap;
        justify-content: center;
      }

      .legend-item {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 11px;
        font-weight: 700;
        color: var(--text-mid);
      }

      .legend-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
      }

      .legend-dot.fast {
        background: var(--blush-dk);
      }
      .legend-dot.medium {
        background: var(--caramel);
      }
      .legend-dot.slow {
        background: var(--mocha);
      }

      /* ── Responsive ── */
      @media (max-width: 420px) {
        .header-title {
          font-size: 28px;
        }
        .hud-card {
          min-width: 90px;
          padding: 8px 14px;
        }
        .hud-value {
          font-size: 22px;
        }
      }
      @media (max-width: 768px) {
        .header-title {
          font-size: 28px;
        }

        .overlay-title {
          font-size: 28px;
        }

        .overlay {
          gap: 12px;
          padding: 20px;
        }

        .grid-container {
          width: min(75vw, 340px);
          height: min(75vw, 340px);
        }
      }
    </style>
  </head>
