<!doctype html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Doggy Dodge</title>

<link
href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap"
rel="stylesheet"
/>

<style>
*,
*::before,
*::after{
    box-sizing:border-box;
    margin:0;
    padding:0;
}

:root{
  --warm-white:#fff9f2;
  --sand:#f0e4d0;
  --caramel:#d4956a;
  --caramel-lt:#e8b48a;
  --rust:#c26a3a;
  --mocha:#7a4f35;
  --sage-lt:#b2c9b4;
  --sage-dk:#5c7a5e;
  --blush-dk:#c46060;
  --shadow:rgba(122,79,53,.12);
  --shadow-md:rgba(122,79,53,.2);
  --text-dark:#4a3525;
  --text-mid:#7a5a40;
  --text-light:#a17353;
  --cell-bg:#f5ead8;
  --cell-hover:#ecd8be;
  --grid-bg:#ede0cc;
}

body{
  font-family:'Nunito',sans-serif;
  min-height:100vh;
  background:#d6cfc8;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:20px;
  color:var(--text-dark);
}

/* HEADER */

.header{
    text-align:center;
    margin-bottom:20px;
}

.header-eyebrow{
    font-size:11px;
    font-weight:700;
    letter-spacing:.25em;
    text-transform:uppercase;
    color:var(--text-light);
}

.header-title{
    font-size:38px;
    font-weight:900;
    color:var(--mocha);
}

.header-title span{
    color:var(--caramel);
}

.header-subtitle{
    margin-top:6px;
    font-size:13px;
    color:var(--text-light);
}

/* GAME */

.game-wrapper{
    position:relative;
}

.grid-container{
    display:grid;
    grid-template-columns:repeat(10,1fr);
    gap:4px;

    width:min(75vw,420px);
    height:min(75vw,420px);

    padding:14px;
    border-radius:22px;

    background:var(--grid-bg);

    box-shadow:
    0 4px 28px var(--shadow-md),
    inset 0 1px 0 rgba(255,255,255,.6);
}

.cell{
    background:var(--cell-bg);
    border-radius:6px;
    transition:.2s;
}

.cell:hover{
    background:var(--cell-hover);
}

.cell:nth-child(7n+3){
    background:#f7eedd;
}

.cell:nth-child(11n+5){
    background:#f2e5cc;
}

.player{
    background:var(--sage-lt)!important;
    box-shadow:
    0 0 0 2px var(--sage-dk),
    0 2px 8px rgba(92,122,94,.25);
}

.enemy{
    background:#fce8e8!important;
    box-shadow:
    0 0 0 2px var(--blush-dk),
    0 2px 8px rgba(196,96,96,.2);
}

/* OVERLAY */

.overlay{
    position:absolute;
    inset:0;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    gap:18px;

    padding:30px;
    border-radius:22px;

    background:rgba(253,246,238,.9);
    backdrop-filter:blur(6px);
}

.overlay-badge{
    background:var(--caramel-lt);
    padding:6px 14px;
    border-radius:30px;

    font-size:11px;
    font-weight:800;
}

.overlay-title{
    font-size:34px;
    font-weight:900;
    text-align:center;
}

.overlay-title em{
    color:var(--rust);
    font-style:normal;
}

.overlay-desc{
    font-size:14px;
    text-align:center;
    color:var(--text-mid);
}

.btn-primary{
    border:none;
    cursor:pointer;

    padding:14px 40px;
    border-radius:14px;

    font-size:16px;
    font-weight:800;
    color:white;

    background:
    linear-gradient(
    145deg,
    var(--caramel-lt),
    var(--caramel)
    );

    box-shadow:
    0 4px 0 var(--rust),
    0 6px 16px rgba(212,149,106,.35);

    transition:.15s;
}

.btn-primary:hover{
    transform:translateY(-2px);
}

.btn-primary:active{
    transform:translateY(2px);
}

/* FOOTER */

.footer-hint{
    margin-top:18px;
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    justify-content:center;
    font-size:12px;
}

.hint-key{
    padding:4px 10px;
    border-radius:8px;
    background:var(--warm-white);
    border:1px solid var(--sand);
    font-weight:800;
}

/* MOBILE */

@media(max-width:768px){

.header-title{
    font-size:28px;
}

.overlay-title{
    font-size:28px;
}

.grid-container{
    width:min(85vw,320px);
    height:min(85vw,320px);
}

}

</style>
</head>

<body>

<header class="header">
    <p class="header-eyebrow">Penugasan Kalkulus Lanjut</p>

    <h1 class="header-title">
        Doggy <span>Dodge</span>
    </h1>

    <p class="header-subtitle">
        Selamatkan dirimu dari Doggy galak
    </p>
</header>

<div class="game-wrapper">

<div class="grid-container" id="grid"></div>

<div class="overlay">

<div class="overlay-badge">
🐱 Kelompok 6
</div>

<div class="overlay-title">
Siap Untuk<br>
<em>Menghindar?</em>
</div>

<div class="overlay-desc">
Arahkan player, hindari musuh,<br>
dan bertahan selama mungkin
</div>

<button class="btn-primary"
onclick="location.href='game.html'">
Mulai
</button>

</div>

</div>

<div class="footer-hint">
<div class="hint-key">W A S D</div>
atau
<div class="hint-key">↑ ← ↓ →</div>
untuk kontrol player
</div>

<script>

const grid=document.getElementById("grid");

for(let i=0;i<100;i++){

    const cell=document.createElement("div");
    cell.classList.add("cell");

    if(i===55){
        cell.classList.add("player");
    }

    if([2,8,14,21,48,72,93].includes(i)){
        cell.classList.add("enemy");
    }

    grid.appendChild(cell);
}

</script>

</body>
</html>
