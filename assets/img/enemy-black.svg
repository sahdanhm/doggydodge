<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 72" width="88%" height="88%">
        <!-- Ekor melengkung ke atas kanan -->
        <path d="M46 52 Q60 44 57 30 Q55 22 48 25" stroke="#888888" stroke-width="5" fill="none" stroke-linecap="round"/>
        <path d="M46 52 Q60 44 57 30 Q55 22 48 25" stroke="##c8c8c8" stroke-width="3" fill="none" stroke-linecap="round"/>

        <!-- Badan bulat gemuk -->
        <ellipse cx="30" cy="54" rx="19" ry="16" fill="##c8c8c8"/>
        <!-- Perut pucat -->
        <ellipse cx="30" cy="57" rx="11" ry="9" fill="white" opacity="0.35"/>

        <!-- Kaki depan kiri -->
        <rect x="14" y="64" width="10" height="7" rx="5" fill="##c8c8c8"/>
        <!-- Kaki depan kanan -->
        <rect x="36" y="64" width="10" height="7" rx="5" fill="##c8c8c8"/>

        <!-- Kepala bulat besar -->
        <circle cx="32" cy="26" r="20" fill="##c8c8c8"/>

        <!-- Telinga floppy kiri — nggantung ke bawah -->
        <ellipse cx="13" cy="22" rx="7" ry="11" fill="#888888" transform="rotate(-10 13 22)"/>
        <!-- Telinga floppy kanan -->
        <ellipse cx="51" cy="22" rx="7" ry="11" fill="#888888" transform="rotate(10 51 22)"/>

        <!-- Moncong putih bulat -->
        <ellipse cx="32" cy="33" rx="11" ry="8" fill="white" opacity="0.6"/>

        <!-- Hidung bulat hitam besar -->
        <ellipse cx="32" cy="28" rx="6" ry="4.5" fill="#111"/>
        <!-- Kilap hidung -->
        <ellipse cx="29" cy="26.5" rx="2" ry="1.3" fill="white" opacity="0.55"/>

        <!-- Mata kiri -->
        <circle cx="21" cy="21" r="6" fill="white"/>
        <circle cx="22" cy="22" r="4" fill="#5b8fd4"/>
        <circle cx="22.5" cy="22" r="2.2" fill="#111"/>
        <circle cx="20.5" cy="20" r="1.4" fill="white"/>

        <!-- Mata kanan -->
        <circle cx="43" cy="21" r="6" fill="white"/>
        <circle cx="42" cy="22" r="4" fill="#5b8fd4"/>
        <circle cx="41.5" cy="22" r="2.2" fill="#111"/>
        <circle cx="41.5" cy="20" r="1.4" fill="white"/>

        <!-- Alis tebal -->
        <path d="M15 16 Q21 12 27 16" stroke="#888888" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <path d="M37 16 Q43 12 49 16" stroke="#888888" stroke-width="2.5" fill="none" stroke-linecap="round"/>

        <!-- Mulut -->
        <path d="M26 36 Q32 41 38 36" stroke="#888888" stroke-width="2" fill="none" stroke-linecap="round"/>
      </svg>